<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Perle d'Addis</title>
    
    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://hwgvtgqwwowmyanaraj.supabase.co">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Client library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    
    <script>
        tailwind.config = { theme: { extend: { colors: { luxury: { gold: '#D4AF37', charcoal: '#1A1A1A', cream: '#FDFBF7' } } } } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;400;600&display=swap');
        body { font-family: 'Montserrat', sans-serif; }
        h1, h2, h3, .luxury-font { font-family: 'Cormorant Garamond', serif; }
    </style>
</head>
<body class="bg-luxury-cream text-luxury-charcoal">

    <header class="sticky top-0 z-50 bg-luxury-cream/95 backdrop-blur-md border-b border-luxury-gold/10">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="text-center cursor-pointer" onclick="handleLogoTap()">
                <h1 class="text-2xl font-light tracking-[0.25em] text-luxury-charcoal uppercase">La Perle d'Addis</h1>
                <p class="text-[9px] tracking-[0.4em] text-luxury-gold uppercase">Luxury Fragrances</p>
            </div>
            <button class="text-luxury-charcoal">Bag (<span id="cart-count">0</span>)</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="col-span-full text-center py-20">Loading collection...</p>
        </div>
    </main>

    <div id="admin-modal" class="fixed inset-0 z-50 bg-black/90 hidden flex items-center justify-center p-4">
        <div class="bg-neutral-900 p-8 rounded-lg max-w-2xl w-full text-white">
            <h2 class="text-xl mb-6 border-b border-zinc-800 pb-2">Vault Control Center</h2>
            <div id="admin-auth">
                <input type="password" id="admin-pass" placeholder="Password" class="w-full bg-zinc-800 p-3 mb-4 rounded text-black">
                <button onclick="verifyAccess()" class="w-full bg-luxury-gold py-2 font-bold uppercase">Unlock</button>
            </div>
            <div id="admin-workspace" class="hidden">
                <form id="add-product-form" onsubmit="handleAddNewProduct(event)" class="grid grid-cols-2 gap-4 mb-8">
                    <input type="text" id="adm-name" placeholder="Name" required class="bg-zinc-800 p-3 rounded">
                    <input type="text" id="adm-brand" placeholder="Brand" required class="bg-zinc-800 p-3 rounded">
                    <input type="number" id="adm-price" placeholder="Price" required class="bg-zinc-800 p-3 rounded">
                    <input type="url" id="adm-image" placeholder="Image URL" required class="bg-zinc-800 p-3 rounded">
                    <button type="submit" class="col-span-2 bg-emerald-600 py-3 rounded">Add Product</button>
                </form>
                <button onclick="toggleAdminModal()" class="text-zinc-500 underline">Close</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize with defer logic
        window.addEventListener('load', () => {
            const supabase = window.supabase.createClient('https://hwgvtgqwwowmyanaraj.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3Z3Z0dnFnd3dvd215YW5hcmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5ODg2NjAsImV4cCI6MjA5NjU2NDY2MH0.hij86RsKrWu7QJLE5pRzYN2FohNT501mSgBC4QvWF7E');
            
            async function fetchProducts() {
                // Optimized fetch: limited to 20 items to improve load speed
                const { data } = await supabase.from('products').select('*').limit(20);
                const grid = document.getElementById('product-grid');
                if (data && data.length > 0) {
                    grid.innerHTML = data.map(p => `
                        <div class="bg-white p-4 border border-luxury-gold/10 hover:shadow-xl transition-shadow">
                            <img src="${p.image}" alt="${p.name}" class="w-full h-64 object-cover mb-4">
                            <h3 class="text-lg font-bold">${p.name}</h3>
                            <p class="text-luxury-gold">${p.price} ETB</p>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<p class="col-span-full text-center">No products found.</p>';
                }
            }

            // Global functions attached to window for scope
            window.handleAddNewProduct = async function(e) {
                e.preventDefault();
                const p = {
                    name: document.getElementById('adm-name').value,
                    brand: document.getElementById('adm-brand').value,
                    price: document.getElementById('adm-price').value,
                    image: document.getElementById('adm-image').value,
                    category: 'unisex'
                };
                await supabase.from('products').insert([p]);
                alert("Product Added!");
                fetchProducts();
            };

            window.toggleAdminModal = () => document.getElementById('admin-modal').classList.toggle('hidden');
            window.verifyAccess = () => {
                if(document.getElementById('admin-pass').value === '123456') {
                    document.getElementById('admin-auth').classList.add('hidden');
                    document.getElementById('admin-workspace').classList.remove('hidden');
                }
            };
            window.handleLogoTap = () => toggleAdminModal();

            fetchProducts();
        });
    </script>
</body>
</html>
