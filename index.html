<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Perle d'Addis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js" defer></script>
    
    <script>
        tailwind.config = { theme: { extend: { colors: { luxury: { gold: '#D4AF37', charcoal: '#1A1A1A', cream: '#FDFBF7' } } } } }
    </script>
</head>
<body class="bg-luxury-cream text-luxury-charcoal">

    <header class="sticky top-0 z-50 bg-luxury-cream/95 backdrop-blur-md border-b border-luxury-gold/10">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <h1 class="text-2xl font-light tracking-[0.25em] cursor-pointer" onclick="toggleAdminModal()">LA PERLE D'ADDIS</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="col-span-full text-center">Loading from Firebase...</p>
        </div>
    </main>

    <!-- Admin Modal -->
    <div id="admin-modal" class="fixed inset-0 z-50 bg-black/90 hidden flex items-center justify-center p-4">
        <div class="bg-neutral-900 p-8 rounded-lg max-w-2xl w-full text-white">
            <div id="admin-auth">
                <input type="password" id="admin-pass" placeholder="Password" class="w-full bg-zinc-800 p-3 mb-4 rounded text-black">
                <button onclick="verifyAccess()" class="w-full bg-luxury-gold py-2 font-bold uppercase">Unlock</button>
            </div>
            <div id="admin-workspace" class="hidden">
                <form id="add-product-form" onsubmit="handleAddNewProduct(event)" class="grid grid-cols-2 gap-4">
                    <input type="text" id="adm-name" placeholder="Name" required class="bg-zinc-800 p-2 rounded">
                    <input type="number" id="adm-price" placeholder="Price" required class="bg-zinc-800 p-2 rounded">
                    <button type="submit" class="col-span-2 bg-emerald-600 py-2">Add to Firebase</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAQ55IXBEPKBTdHLGBuIm-G3ngx1glZNT8",
            authDomain: "laperledaddis.firebaseapp.com",
            projectId: "laperledaddis",
            storageBucket: "laperledaddis.firebasestorage.app",
            messagingSenderId: "679367844020",
            appId: "1:679367844020:web:a749056410dbcbf217b7e1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function fetchProducts() {
            const grid = document.getElementById('product-grid');
            try {
                const snapshot = await db.collection('products').get();
                if (snapshot.empty) {
                    grid.innerHTML = '<p class="col-span-full text-center">No products found in database.</p>';
                    return;
                }
                grid.innerHTML = snapshot.docs.map(doc => {
                    const p = doc.data();
                    return `
                        <div class="bg-white p-4 border border-luxury-gold/10">
                            <h3 class="text-lg font-bold">${p.name}</h3>
                            <p class="text-luxury-gold">${p.price} ETB</p>
                        </div>`;
                }).join('');
            } catch (err) {
                console.error("Error fetching:", err);
            }
        }

        async function handleAddNewProduct(e) {
            e.preventDefault();
            await db.collection('products').add({
                name: document.getElementById('adm-name').value,
                price: document.getElementById('adm-price').value
            });
            alert("Added to Firebase!");
            document.getElementById('adm-name').value = '';
            document.getElementById('adm-price').value = '';
            fetchProducts();
        }

        window.verifyAccess = () => { if(document.getElementById('admin-pass').value === '123456') { document.getElementById('admin-auth').classList.add('hidden'); document.getElementById('admin-workspace').classList.remove('hidden'); } };
        window.toggleAdminModal = () => document.getElementById('admin-modal').classList.toggle('hidden');
        
        fetchProducts();
    </script>
</body>
</html>
