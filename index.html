<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Perle d’Addis | Admin</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Montserrat:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Cormorant Garamond"', 'serif'],
            sans: ['"Montserrat"', 'sans-serif'],
          },
          colors: {
            luxury: {
              cream: '#F9F8F6',
              charcoal: '#111111',
              gold: '#C5A059',
              border: '#EAE8E4'
            }
          }
        }
      }
    }
  </script>

  <style>
    body { background-color: #FFFFFF; color: #111111; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const APP_ID = 'la-perle-addis-storefront';

    let productsData = [];

    window.initFirestore = async () => {
      try {
        await signInAnonymously(auth);
        const q = query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'products'));
        
        onSnapshot(q, (snapshot) => {
          productsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          renderStorefront();
          if(window.renderAdminProducts) window.renderAdminProducts();
        }, (err) => {
          console.error("Firestore Sync Error: ", err);
        });
      } catch (e) {
        console.error("Authentication Error:", e);
      }
    };

    window.saveProductToCloud = async (product) => {
      try {
        const pDoc = doc(db, 'artifacts', APP_ID, 'public', 'data', 'products', product.id);
        await setDoc(pDoc, product);
      } catch (e) {
        console.error("Save Error:", e);
      }
    };

    window.deleteProductFromCloud = async (id) => {
      try {
        const pDoc = doc(db, 'artifacts', APP_ID, 'public', 'data', 'products', id);
        await deleteDoc(pDoc);
      } catch (e) {
        console.error("Delete Error:", e);
      }
    };

    window.getProductsData = () => productsData;
    window.onload = () => window.initFirestore();
  </script>
</head>
<body class="font-sans">

  <header class="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-luxury-border">
    <div class="max-w-7xl mx-auto px-4 sm:px-8 py-4 flex items-center justify-between">
      <div class="flex flex-col cursor-pointer select-none" id="brand-logo" onclick="handleBrandTap()">
        <span class="text-lg sm:text-2xl font-serif tracking-[0.25em] font-light text-luxury-charcoal uppercase">La Perle d’Addis</span>
      </div>
    </div>
  </header>

  <main id="collection-section" class="py-20 max-w-7xl mx-auto px-4 sm:px-8">
    <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </main>

  <div id="admin-modal" class="fixed inset-0 z-50 overflow-y-auto hidden">
    <div class="fixed inset-0 bg-black/75 backdrop-blur-md" onclick="closeAdminPanel()"></div>
    <div class="relative min-h-screen flex items-center justify-center p-6">
      <div class="relative bg-white border border-luxury-gold/50 shadow-2xl w-full max-w-4xl p-10">
        
        <div id="admin-password-lock" class="py-12 text-center space-y-4">
          <input type="password" id="admin-key" placeholder="••••••••" onkeydown="checkAdminPasswordOnEnter(event)" class="w-full text-center text-xs p-3 bg-luxury-cream border">
          <button onclick="verifyAdminPassword()" class="w-full bg-luxury-charcoal text-white text-[11px] uppercase tracking-widest py-3">Unlock Inventory Manager</button>
        </div>
        
        <div id="admin-workspace" class="hidden space-y-8">
          <h3 class="text-xs uppercase tracking-widest text-luxury-charcoal font-semibold">Inventory Manager (Live Sync)</h3>
          <div id="admin-product-list" class="max-h-[300px] overflow-y-auto space-y-2 border p-2"></div>
          <form id="product-form" onsubmit="handleProductSubmit(event)" class="grid grid-cols-2 gap-4 text-xs">
            <input type="hidden" id="admin-product-id">
            <input type="text" id="admin-brand" required placeholder="Brand" class="p-2 bg-luxury-cream border">
            <input type="text" id="admin-name" required placeholder="Name" class="p-2 bg-luxury-cream border">
            <input type="number" id="admin-price" required placeholder="Price" class="p-2 bg-luxury-cream border">
            <input type="text" id="admin-image" required placeholder="Image URL" class="p-2 bg-luxury-cream border">
            <button type="submit" class="col-span-2 bg-luxury-gold text-white py-3">Sync Item to Cloud Inventory</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    function renderStorefront() {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = getProductsData().map(product => `
        <div class="group border p-4">
          <img src="${product.image}" onerror="this.src='https://placehold.co/400x500/F9F8F6/111111?text=Image'" class="w-full aspect-[4/5] object-cover">
          <div class="pt-4 space-y-1">
            <span class="text-luxury-gold text-[10px] uppercase font-bold">${product.brand}</span>
            <h3 class="text-xl font-serif">${product.name}</h3>
            <p class="text-sm">${product.price.toLocaleString()} ETB</p>
          </div>
        </div>
      `).join('');
    }

    window.renderAdminProducts = () => {
      const container = document.getElementById('admin-product-list');
      container.innerHTML = getProductsData().map(p => `
        <div class="flex justify-between items-center p-2 bg-luxury-cream border text-xs">
          <span class="truncate">${p.name} - ${p.brand}</span>
          <button onclick="deleteProduct('${p.id}')" class="text-red-500 font-bold">REMOVE</button>
        </div>
      `).join('');
    };

    async function handleProductSubmit(e) {
      e.preventDefault();
      const product = {
        id: document.getElementById('admin-product-id').value || 'prod-' + Date.now(),
        brand: document.getElementById('admin-brand').value,
        name: document.getElementById('admin-name').value,
        price: Number(document.getElementById('admin-price').value),
        image: document.getElementById('admin-image').value
      };
      await saveProductToCloud(product);
      document.getElementById('product-form').reset();
      document.getElementById('admin-product-id').value = '';
    }

    async function deleteProduct(id) { await deleteProductFromCloud(id); }

    function verifyAdminPassword() {
      if (document.getElementById('admin-key').value === 'pearl_access') {
        document.getElementById('admin-password-lock').classList.add('hidden');
        document.getElementById('admin-workspace').classList.remove('hidden');
      }
    }

    function handleBrandTap() { document.getElementById('admin-modal').classList.remove('hidden'); }
    function closeAdminPanel() { document.getElementById('admin-modal').classList.add('hidden'); }
    function checkAdminPasswordOnEnter(e) { if(e.key === 'Enter') verifyAdminPassword(); }
  </script>
</body>
</html>
